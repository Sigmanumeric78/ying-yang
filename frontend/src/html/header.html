<header>
    <a id="logo" href="/" router-link>
        <div class="icon">
            <img src="./images/logo.png" alt="logo" style="width: 100%; height: 100%;" />
        </div>
        <h1 class="text">

            whitespaces
            <!-- <div class="bottom">5 year anniversary!</div> -->
        </h1>
    </a>
    <nav>
        <div class="spacer"></div>
        <button
            class="text showAlerts"
            onclick="this.blur()"
            data-nav-item="alerts"
        >
            <div class="icon">
                <i class="fas fa-fw fa-bell"></i>
            </div>
            <div class="notificationBubble hidden"></div>
        </button>
        <a
            class="textButton view-login"
            data-nav-item="login"
            href="/login"
            onclick="this.blur()"
            router-link
        >
            <i class="far fa-fw fa-user"></i>
        </a>
        <div class="accountButtonAndMenu hidden">
            <a
                class="textButton view-account"
                data-nav-item="account"
                href="/account"
                onclick="this.blur()"
                router-link
            >
                <div class="spinner">
                    <i class="fas fa-fw fa-spin fa-circle-notch"></i>
                </div>
                <div class="avatar"></div>
                <div class="notificationBubble hidden"></div>
                <div class="text"></div>
                <div class="levelAndBar">
                    <div class="level" data-balloon-pos="up">1</div>
                    <div class="xpBar">
                        <div class="bar"></div>
                        <div class="xpBreakdown">
                            <div class="total"></div>
                            <!-- <div class="divider"></div> -->
                            <div class="list"></div>
                        </div>
                    </div>
                </div>
            </a>
            <div class="menu">
                <div class="spacer"></div>
                <div class="items">
                    <a
                        href="/account"
                        class="button"
                        onclick="this.blur()"
                        router-link
                    >
                        <i class="fas fa-fw fa-chart-line"></i>
                        User stats
                    </a>
                    <a
                        href="/friends"
                        class="button goToFriends"
                        onclick="this.blur()"
                        router-link
                    >
                        <i class="fas fa-fw fa-user-friends"></i>
                        Friends
                        <span class="notificationBubble hidden">99</span>
                    </a>
                    <a
                        href="/404"
                        class="button goToProfile"
                        onclick="this.blur()"
                        router-link
                    >
                        <i class="fas fa-fw fa-globe-americas"></i>
                        Public profile
                    </a>
                    <a
                        href="/account-settings"
                        class="button"
                        onclick="this.blur()"
                        router-link
                    >
                        <i class="fas fa-fw fa-cog"></i>
                        Account settings
                    </a>
                    <button class="signOut" onclick="this.blur()">
                        <i class="fas fa-fw fa-sign-out-alt"></i>
                        Sign out
                    </button>
                </div>
            </div>
        </div>
    </nav>
</header>
